<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Analyzer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #060b18;
  --bg-surface: rgba(15, 26, 46, 0.85);
  --bg-card: rgba(22, 34, 64, 0.7);
  --bg-hover: rgba(28, 45, 74, 0.8);
  --border: rgba(30, 45, 72, 0.6);
  --text: #e0e8f0;
  --text-dim: #6b7fa0;
  --green: #00d4aa;
  --green-glow: rgba(0,212,170,0.15);
  --purple: #8b5cf6;
  --purple-glow: rgba(139,92,246,0.15);
  --blue: #3b82f6;
  --blue-glow: rgba(59,130,246,0.10);
  --amber: #f59e0b;
  --radius: 14px;
  --radius-sm: 10px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

html { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 0% 0%, rgba(0,212,170,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(139,92,246,0.04) 0%, transparent 60%);
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 8px var(--green-glow); } 50% { box-shadow: 0 0 24px var(--green-glow), 0 0 40px rgba(0,212,170,0.08); } }
@keyframes border-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: rgba(15, 26, 46, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--green), var(--blue), var(--purple));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  animation: float 3s ease-in-out infinite;
}
.logo-text { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-sub { font-size: 10px; font-weight: 400; color: var(--text-dim); letter-spacing: 0.8px; text-transform: uppercase; -webkit-text-fill-color: var(--text-dim); }
.header-actions { display: flex; align-items: center; gap: 10px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.25s var(--ease);
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, var(--green), #00b894);
  color: #0a0e1a;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px var(--green-glow); }
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { background: var(--bg-hover); border-color: var(--green); color: var(--green); transform: translateY(-1px); }
.btn-danger {
  background: transparent;
  color: #ef4444;
  border: 1px solid transparent;
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 6px;
}
.btn-danger:hover { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.06); }

/* ── Main ── */
main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  min-width: 320px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: rgba(15, 26, 46, 0.6);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}

/* ── Drop Zone (CLICKABLE!) ── */
.drop-zone {
  position: relative;
  margin: 14px 14px 0;
  padding: 22px 14px;
  border-radius: var(--radius);
  text-align: center;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  background: rgba(22, 34, 64, 0.4);
  overflow: hidden;
  z-index: 0;
}
.drop-zone::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--radius) + 2px);
  background: linear-gradient(135deg, var(--green), var(--purple), var(--blue), var(--green));
  background-size: 300% 300%;
  animation: border-flow 4s ease infinite;
  z-index: -2;
}
.drop-zone::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: var(--radius);
  background: rgba(15, 26, 46, 0.95);
  z-index: -1;
  transition: background 0.3s var(--ease);
}
.drop-zone:hover::after, .drop-zone.dragover::after { background: rgba(20, 34, 58, 0.95); }
.drop-zone:hover, .drop-zone.dragover { transform: translateY(-1px); }
.drop-zone-icon { font-size: 26px; margin-bottom: 4px; position: relative; }
.drop-zone-text { font-size: 13px; color: var(--text-dim); position: relative; }
.drop-zone-hint { font-size: 11px; color: var(--text-dim); opacity: 0.5; margin-top: 3px; position: relative; }

/* ── Upload Progress ── */
.upload-progress {
  padding: 10px 16px;
  margin: 8px 14px 0;
  background: var(--bg-card);
  backdrop-filter: blur(8px);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  display: none;
  animation: fadeIn 0.3s var(--ease);
}
.upload-progress.active { display: block; }
.upload-progress-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.upload-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.upload-progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--purple), var(--green));
  border-radius: 4px;
  transition: width 0.4s var(--ease);
}

/* ── API Warning ── */
.api-warning {
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  margin: 8px 14px 0;
  font-size: 12px;
  color: var(--amber);
  display: none;
  animation: fadeIn 0.3s var(--ease);
}

/* ── File List ── */
.file-list-wrap { flex: 1; overflow-y: auto; padding: 10px 14px 14px; }
.file-list-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding: 0 4px;
}
.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.25s var(--ease);
  margin-bottom: 4px;
  border: 1px solid transparent;
  animation: fadeIn 0.3s var(--ease);
}
.file-item:hover { background: var(--bg-hover); transform: translateX(2px); }
.file-item.active {
  background: var(--purple-glow);
  border-color: rgba(139,92,246,0.4);
  box-shadow: 0 0 20px rgba(139,92,246,0.06);
}
.file-item.active .file-name { color: #fff; }
.file-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: rgba(22, 34, 64, 0.8);
  color: var(--blue);
  transition: all 0.25s var(--ease);
}
.file-item.active .file-icon { background: var(--purple); color: #fff; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.file-badge {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--green-glow);
  color: var(--green);
  white-space: nowrap;
  font-weight: 500;
}
.file-badge-purple { background: var(--purple-glow); color: #c4a5ff; }
.file-badge-blue { background: var(--blue-glow); color: #93c5fd; }
.file-badge-amber { background: rgba(245,158,11,0.12); color: var(--amber); }
.file-item.active .file-badge { background: var(--purple-glow); color: #c4a5ff; }
.file-action { opacity: 0; transition: opacity 0.25s var(--ease); }
.file-item:hover .file-action { opacity: 1; }

/* ── Query Panel ── */
.query-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Empty State ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 14px;
  animation: fadeIn 0.5s var(--ease);
}
.empty-state-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--bg-card);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  border: 1px solid var(--border);
  animation: float 4s ease-in-out infinite;
}
.empty-state-text { font-size: 15px; font-weight: 500; }
.empty-state-hint { font-size: 13px; opacity: 0.6; }

/* ── Query Bar ── */
.query-bar {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(15, 26, 46, 0.8);
  backdrop-filter: blur(8px);
  animation: fadeIn 0.3s var(--ease);
}
.query-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.query-file-label { font-size: 12px; font-weight: 500; color: var(--text-dim); }
.query-file-label strong { color: var(--text); }
.query-input-wrap { display: flex; gap: 8px; }
.query-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  backdrop-filter: blur(4px);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: all 0.25s var(--ease);
}
.query-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow), inset 0 0 0 1px rgba(0,212,170,0.1); }
.query-input::placeholder { color: var(--text-dim); }
.query-submit {
  padding: 10px 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, var(--green), #00b894);
  color: #0a0e1a;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  white-space: nowrap;
}
.query-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--green-glow); animation: pulse-glow 2s ease-in-out infinite; }
.query-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; animation: none; }

/* ── Results Area ── */
.results-area {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px;
}
.results-area > * { animation: fadeInUp 0.35s var(--ease); }

/* ── Doc Panel ── */
.doc-panel {
  background: linear-gradient(135deg, rgba(22, 34, 64, 0.7), rgba(26, 31, 62, 0.5));
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 16px;
}
.doc-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.doc-panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); }
.doc-type-badge {
  font-size: 11px;
  padding: 4px 14px;
  border-radius: 999px;
  font-weight: 500;
}
.doc-type-payslip { background: rgba(0,212,170,0.15); color: var(--green); }
.doc-type-invoice { background: rgba(139,92,246,0.15); color: #c4a5ff; }
.doc-type-academic_paper { background: rgba(59,130,246,0.15); color: #93c5fd; }
.doc-type-book { background: rgba(245,158,11,0.15); color: var(--amber); }
.doc-type-report { background: rgba(59,130,246,0.15); color: #93c5fd; }
.doc-type-contract { background: rgba(239,68,68,0.15); color: #fca5a5; }
.doc-type-letter { background: rgba(139,92,246,0.15); color: #c4a5ff; }
.doc-type-other { background: rgba(107,114,128,0.15); color: #9ca3af; }
.doc-summary { font-size: 14px; line-height: 1.8; color: var(--text); }

/* ── Answer Card ── */
.answer-card {
  background: var(--bg-card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 14px;
  border-left: 3px solid var(--green);
  transition: all 0.25s var(--ease);
}
.answer-card:hover { border-color: var(--green); }
.answer-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--green);
  margin-bottom: 8px;
  font-weight: 600;
}
.answer-text {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
}
.answer-empty {
  text-align: center;
  padding: 36px;
  color: var(--text-dim);
  font-size: 14px;
}

/* ── Source Toggle ── */
.source-toggle {
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  padding: 8px 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s var(--ease);
}
.source-toggle:hover { color: var(--text); }
.source-toggle .arrow { transition: transform 0.3s var(--ease); display: inline-block; }
.source-toggle.open .arrow { transform: rotate(90deg); }
.sources-wrap { overflow: hidden; max-height: 0; transition: max-height 0.4s var(--ease); }
.sources-wrap.open { max-height: 3000px; }
.source-card {
  background: rgba(15, 26, 46, 0.6);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 8px;
  animation: fadeIn 0.3s var(--ease);
}
.source-card:last-child { margin-bottom: 0; }
.source-num { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
.source-text { font-size: 13px; line-height: 1.7; color: var(--text); }

/* ── Spinner ── */
.spinner {
  width: 24px; height: 24px;
  border: 2px solid rgba(0,212,170,0.1);
  border-top-color: var(--green);
  border-right-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 48px auto;
}

/* ── Toast ── */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  animation: fadeIn 0.3s var(--ease);
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  color: var(--text);
  max-width: 380px;
}
.toast-success { border-color: var(--green); }
.toast-error { border-color: #ef4444; }
.toast-info { border-color: var(--blue); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { width: 260px; min-width: 260px; }
  header { padding: 12px 16px; }
  .query-bar { padding: 12px 16px; }
  .results-area { padding: 12px 16px; }
}
@media (max-width: 600px) {
  main { flex-direction: column; }
  .sidebar { width: 100%; min-width: auto; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  .file-list-wrap { max-height: 120px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#9670;</div>
    <div>
      <div class="logo-text">PDF Analyzer</div>
      <div class="logo-sub">intelligent document RAG</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="refreshFiles()">&#8635; Refresh</button>
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">+ Upload PDF</button>
    <input type="file" id="fileInput" accept=".pdf" hidden onchange="handleFileSelect(this)">
  </div>
</header>

<main>
  <aside class="sidebar">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-zone-icon">&#128196;</div>
      <div class="drop-zone-text">Drop PDF here or click to browse</div>
      <div class="drop-zone-hint">supports .pdf files</div>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="upload-progress-label">Indexing <span id="progressFileName"></span>...</div>
      <div class="upload-progress-bar"><div class="upload-progress-fill" id="progressFill"></div></div>
    </div>
    
    <div class="file-list-wrap">
      <div class="file-list-title">&#8212; Documents &#8212;</div>
      <div id="fileList"></div>
    </div>
  </aside>

  <section class="query-panel">
    <div class="query-bar" id="queryBar" style="display:none">
      <div class="query-header">
        <span class="query-file-label">Querying: <strong id="activeFileName"></strong></span>
        <span class="file-badge" id="activeFileBadge"></span>
      </div>
      <form class="query-input-wrap" onsubmit="submitQuery(event)">
        <input class="query-input" id="queryInput" type="text" placeholder="Ask anything about this document..." autocomplete="off">
        <button class="query-submit" id="querySubmit" type="submit">Ask</button>
      </form>
    </div>
    <div class="results-area" id="resultsArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">&#128196;</div>
        <div class="empty-state-text">Upload a PDF to get started</div>
        <div class="empty-state-hint">Drop a file or click Upload PDF</div>
      </div>
    </div>
  </section>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = '';
let activeFileId = null;

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(40px)'; el.style.transition = '0.3s ease'; setTimeout(() => el.remove(), 300); }, 3500);
}

function handleFileSelect(input) {
  if (input.files.length) uploadFile(input.files[0]);
  input.value = '';
}

const dropZone = document.getElementById('dropZone');
['dragenter', 'dragover'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragover'); });
});
['dragleave', 'drop'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragover'); });
});
dropZone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') uploadFile(file);
  else toast('Please drop a PDF file', 'error');
});

async function uploadFile(file) {
  const progress = document.getElementById('uploadProgress');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressFileName');
  progress.classList.add('active');
  label.textContent = file.name;
  fill.style.width = '20%';

  const form = new FormData();
  form.append('file', file);

  try {
    fill.style.width = '50%';
    const res = await fetch(`${API}/api/upload`, { method: 'POST', body: form });
    const data = await res.json();
    fill.style.width = '100%';

    if (!res.ok) throw new Error(data.detail || 'Upload failed');

    toast(`${data.filename} &rarr; ${data.doc_type} (${data.chunks} chunks)`, 'success');
    await refreshFiles();
    if (data.file_id) selectFile(data.file_id);
  } catch (err) {
    toast(err.message, 'error');
  }
  setTimeout(() => { progress.classList.remove('active'); fill.style.width = '0%'; }, 600);
}

async function refreshFiles() {
  try {
    const res = await fetch(`${API}/api/files`);
    const files = await res.json();
    renderFileList(files);

    const hasKey = files.some(f => f.summary && !f.summary.includes('BAILIAN_API_KEY'));
    document.getElementById('apiWarning').style.display = hasKey ? 'none' : 'block';

    if (activeFileId && files.some(f => f.file_id === activeFileId)) {
      selectFile(activeFileId);
    } else {
      if (files.length) selectFile(files[0].file_id);
      else showEmpty('Upload a PDF to get started', 'Drop a file or click Upload PDF');
    }
  } catch (err) {
    toast('Failed to load files', 'error');
  }
}

function docTypeClass(dt) {
  const map = { payslip: 'payslip', invoice: 'invoice', academic_paper: 'academic_paper', book: 'book', report: 'report', contract: 'contract', letter: 'letter', manual: 'other', financial: 'other', legal: 'other', resume: 'other', presentation: 'other' };
  return 'doc-type-' + (map[dt] || 'other');
}

function docTypeLabel(dt) {
  const map = { payslip: 'Payslip', invoice: 'Invoice', academic_paper: 'Paper', book: 'Book', report: 'Report', contract: 'Contract', letter: 'Letter', manual: 'Manual', financial: 'Financial', legal: 'Legal', resume: 'Resume', presentation: 'Presentation' };
  return map[dt] || 'Document';
}

function renderFileList(files) {
  const el = document.getElementById('fileList');
  if (!files.length) {
    el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-dim);font-size:13px;">No documents yet</div>';
    return;
  }
  el.innerHTML = files.map(f => `
    <div class="file-item${activeFileId === f.file_id ? ' active' : ''}" onclick="selectFile('${f.file_id}')" data-id="${f.file_id}">
      <div class="file-icon">&#128196;</div>
      <div class="file-info">
        <div class="file-name">${escapeHtml(f.filename)}</div>
        <div class="file-meta">${f.chunks} chunks &middot; ${formatSize(f.size)}</div>
      </div>
      <span class="file-badge file-badge-${f.doc_type === 'other' ? 'blue' : 'purple'}">${docTypeLabel(f.doc_type)}</span>
      <span class="file-action"><button class="btn btn-danger" onclick="event.stopPropagation();deleteFile('${f.file_id}')">&times;</button></span>
    </div>
  `).join('');
}

async function selectFile(fileId) {
  activeFileId = fileId;
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === fileId);
  });

  const meta = await getFileMeta(fileId);
  if (meta) {
    document.getElementById('queryBar').style.display = 'block';
    document.getElementById('activeFileName').textContent = meta.filename;
    document.getElementById('activeFileBadge').textContent = `${meta.chunks} chunks`;
    document.getElementById('queryInput').focus();
  }
  document.getElementById('emptyState').style.display = 'none';
  const area = document.getElementById('resultsArea');
  area.querySelectorAll('.answer-card, .spinner, .doc-panel, .source-toggle, .sources-wrap, .answer-empty').forEach(el => el.remove());
  document.getElementById('queryInput').value = '';

  
}

async function getFileMeta(fileId) {
  try {
    const res = await fetch(`${API}/api/files`);
    const files = await res.json();
    return files.find(f => f.file_id === fileId);
  } catch { return null; }
}

async function submitQuery(e) {
  e.preventDefault();
  const input = document.getElementById('queryInput');
  const query = input.value.trim();
  if (!query || !activeFileId) return;

  const submitBtn = document.getElementById('querySubmit');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Analyzing...';

  const area = document.getElementById('resultsArea');
  area.querySelectorAll('.answer-card, .answer-empty').forEach(el => el.remove());
  area.insertAdjacentHTML('beforeend', '<div class="spinner"></div>');

  try {
    const form = new FormData();
    form.append('file_id', activeFileId);
    form.append('query', query);
    form.append('k', '4');

    const res = await fetch(`${API}/api/query`, { method: 'POST', body: form });
    const data = await res.json();
    area.querySelector('.spinner')?.remove();

    if (!res.ok) throw new Error(data.detail || 'Query failed');

    const isSmart = data.answer && !data.answer.includes('BAILIAN_API_KEY');
    const answerText = isSmart ? data.answer : 'LLM unavailable. Set BAILIAN_API_KEY in .env for AI answers.';

    area.insertAdjacentHTML('beforeend', `
      <div class="answer-card">
        <div class="answer-label">${isSmart ? '&#9654; Answer' : '&#9888; Note'}</div>
        <div class="answer-text">${escapeHtml(answerText)}</div>
      </div>
    `);

    if (data.sources && data.sources.length) {
      const sid = 'sources_' + Date.now();
      area.insertAdjacentHTML('beforeend', `
        <div class="source-toggle" onclick="toggleSources('${sid}')">
          <span class="arrow">&#9654;</span> View ${data.sources.length} source chunks
        </div>
        <div class="sources-wrap" id="${sid}">
          ${data.sources.map((s, i) => `
            <div class="source-card">
              <div class="source-num">Source ${i + 1}</div>
              <div class="source-text">${escapeHtml(s)}</div>
            </div>
          `).join('')}
        </div>
      `);
    }
  } catch (err) {
    document.querySelector('.spinner')?.remove();
    toast(err.message, 'error');
  }
  submitBtn.disabled = false;
  submitBtn.textContent = 'Ask';
}

function toggleSources(id) {
  const wrap = document.getElementById(id);
  const toggle = wrap.previousElementSibling;
  wrap.classList.toggle('open');
  toggle.classList.toggle('open');
}

async function deleteFile(fileId) {
  if (!confirm('Delete this document and its embeddings?')) return;
  try {
    const res = await fetch(`${API}/api/files/${fileId}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    toast('Document deleted', 'info');
    if (activeFileId === fileId) activeFileId = null;
    await refreshFiles();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function showEmpty(title, hint) {
  document.getElementById('queryBar').style.display = 'none';
  const es = document.getElementById('emptyState');
  es.style.display = 'flex';
  es.querySelector('.empty-state-text').textContent = title;
  es.querySelector('.empty-state-hint').textContent = hint;
  document.getElementById('resultsArea').querySelectorAll('.answer-card, .spinner, .doc-panel, .source-toggle, .sources-wrap, .answer-empty').forEach(el => el.remove());
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / 1048576).toFixed(1) + 'MB';
}

refreshFiles();
</script>
</body>
</html>
